<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Beautiful Rounded Dark Green Background representing the Turf Field -->
  <rect width="512" height="512" rx="128" fill="url(#turf-gradient)"/>
  
  <defs>
    <!-- Premium radial/linear gradient for the field background -->
    <linearGradient id="turf-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#032b21"/>
      <stop offset="100%" stop-color="#084235"/>
    </linearGradient>
    
    <!-- Neon Lime glow drop-shadow filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing Neon Lime Inner Field Line / Stadium Track -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="none" stroke="#C5F135" stroke-width="12" stroke-opacity="0.3"/>
  <rect x="72" y="72" width="368" height="368" rx="80" fill="none" stroke="#C5F135" stroke-width="4" stroke-dasharray="16 12" stroke-opacity="0.2"/>

  <!-- Stylized Athletic T for TURFIEZ with Dynamic Action Slashes -->
  <g filter="url(#neon-glow)">
    <!-- Main Vertical Bar of T -->
    <path d="M224 180h64v240h-64z" fill="#C5F135"/>
    <!-- Top Horizontal Crossbar of T -->
    <path d="M144 116h224v64H144z" fill="#C5F135"/>
    <!-- Dynamic dark green slash cut across the T for athletic speed feeling -->
    <path d="M128 350 L384 150" stroke="#032b21" stroke-width="20"/>
    <!-- Accompanying trailing energy trail in neon lime -->
    <path d="M160 380 L352 230" stroke="#C5F135" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>